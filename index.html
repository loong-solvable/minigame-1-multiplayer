<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Dino Hole Rampage Online</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <canvas id="game"></canvas>

  <div id="hud">
    <div class="panel" id="stats"></div>
    <div class="panel">
      <strong>排行榜</strong>
      <div id="leaderboard"></div>
    </div>
  </div>

  <div id="hint">拖动屏幕或按住鼠标拖动，控制你的恐龙黑洞</div>

  <div id="menuOverlay" class="overlay">
    <div class="card menuCard">
      <div class="cardGlow"></div>
      <div class="eyebrow">多人联机模式</div>
      <h1>Dino Hole Rampage Online</h1>
      <p class="intro">
        创建房间，分享 5 位房间码，让其他玩家加入后由房主开局。房间上限 8 人，开局后会自动补 bot 到 6 名参赛者。
      </p>

      <div id="landingSection">
        <label class="field">
          <span>昵称</span>
          <input id="nameInput" maxlength="14" placeholder="输入你的名字" />
        </label>
        <label class="field">
          <span>房间码</span>
          <input id="roomCodeInput" maxlength="5" placeholder="输入房间码加入" />
        </label>
        <div class="actions">
          <button id="createRoomBtn" class="primary">创建房间</button>
          <button id="joinRoomBtn">加入房间</button>
        </div>
      </div>

      <div id="roomSection" class="hidden">
        <div class="roomHeader">
          <div>
            <div class="roomLabel">房间码</div>
            <div id="roomCodeBadge" class="roomCode">-----</div>
          </div>
          <button id="copyRoomBtn" class="ghost">复制房间码</button>
        </div>

        <div class="roomMeta">
          <span id="hostStatus">你是房主</span>
          <span id="phaseStatus">等待开局</span>
        </div>

        <div id="playersList" class="playersList"></div>

        <div class="actions">
          <button id="startMatchBtn" class="primary">开始对局</button>
          <button id="leaveRoomBtn">离开房间</button>
        </div>
      </div>

      <div id="menuError" class="errorText"></div>
    </div>
  </div>

  <div id="resultOverlay" class="overlay hidden">
    <div class="card resultCard">
      <h2>对局结束</h2>
      <p id="resultSummary"></p>
      <div id="resultBoard" class="resultBoard"></div>
      <div class="actions">
        <button id="rematchBtn" class="primary">再开一局</button>
        <button id="leaveAfterMatchBtn">离开房间</button>
      </div>
    </div>
  </div>

  <script type="module" src="client/main.js"></script>
</body>
</html>
