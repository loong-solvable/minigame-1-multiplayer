apply plugin: 'com.android.application'

import java.io.FileInputStream
import java.util.Properties

// Release signing can come from android/signing.properties
// or from environment variables in CI.
def signingProps = new Properties()
def signingPropsFile = rootProject.file('signing.properties')
if (signingPropsFile.exists()) {
    signingProps.load(new FileInputStream(signingPropsFile))
}

def envStoreFile = System.getenv('ANDROID_KEYSTORE_PATH')
def envStorePassword = System.getenv('ANDROID_KEYSTORE_PASSWORD')
def envKeyAlias = System.getenv('ANDROID_KEY_ALIAS')
def envKeyPassword = System.getenv('ANDROID_KEY_PASSWORD')

def hasFileSigning = ['storeFile', 'storePassword', 'keyAlias', 'keyPassword'].every { key ->
    def v = signingProps.getProperty(key)
    v != null && !v.trim().isEmpty()
}
def hasEnvSigning = [envStoreFile, envStorePassword, envKeyAlias, envKeyPassword].every { v ->
    v != null && !v.trim().isEmpty()
}
def hasReleaseSigning = hasFileSigning || hasEnvSigning

android {
    namespace "com.newai.minigame"
    compileSdk rootProject.ext.compileSdkVersion

    defaultConfig {
        applicationId "com.newai.minigame"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 10000
        versionName "1.0.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
            // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
            // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }

    signingConfigs {
        release {
            if (hasFileSigning) {
                storeFile rootProject.file(signingProps.getProperty('storeFile'))
                storePassword signingProps.getProperty('storePassword')
                keyAlias signingProps.getProperty('keyAlias')
                keyPassword signingProps.getProperty('keyPassword')
            } else if (hasEnvSigning) {
                storeFile rootProject.file(envStoreFile)
                storePassword envStorePassword
                keyAlias envKeyAlias
                keyPassword envKeyPassword
            }
        }
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
            if (hasReleaseSigning) {
                signingConfig signingConfigs.release
            }
        }
    }
}

gradle.taskGraph.whenReady { graph ->
    def runningReleaseTask = graph.allTasks.any { task ->
        task.name.toLowerCase().contains('release')
    }

    if (runningReleaseTask && !hasReleaseSigning) {
        throw new GradleException(
            "Release signing is not configured. Add android/signing.properties (see signing.properties.example) " +
            "or set ANDROID_KEYSTORE_PATH / ANDROID_KEYSTORE_PASSWORD / ANDROID_KEY_ALIAS / ANDROID_KEY_PASSWORD."
        )
    }
}

repositories {
    flatDir {
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}